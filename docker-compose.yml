services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: dev
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
      - node-modules-data:/var/www/html/node_modules
    networks:
      - finance-net
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5173:5173"

  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: dev
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
      - node-modules-data:/var/www/html/node_modules
    networks:
      - finance-net
    depends_on:
      mysql:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=180"]
    restart: unless-stopped

  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - finance-net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: finance
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-finance_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-net
    # MySQL is NOT exposed to the host — internal only

volumes:
  mysql-data:
  vendor-data:
  node-modules-data:

networks:
  finance-net:
    driver: bridge
