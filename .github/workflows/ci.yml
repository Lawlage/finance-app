name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: ./vendor/bin/pint --test
      - run: ./vendor/bin/phpstan analyse --memory-limit=512M
      - run: ./vendor/bin/rector --dry-run

  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: finance_test
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_USER: finance_user
          MYSQL_PASSWORD: secret
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: xdebug
      - run: composer install --no-interaction --prefer-dist
      - run: cp .env.example .env && php artisan key:generate
      - name: Run tests with coverage
        run: ./vendor/bin/pest --coverage --min=90
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: finance_test
          DB_USERNAME: finance_user
          DB_PASSWORD: secret

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint resources/js/
      - run: npx prettier --check "resources/js/**/*.{ts,tsx,css,json}"

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox
      - run: docker compose up -d --build
      - name: Fix permissions and install dependencies
        run: |
          docker compose exec -T -u root app chown -R www:www /var/www/html/vendor /var/www/html/node_modules /var/www/html/storage /var/www/html/bootstrap/cache
          docker compose exec -T app composer install --no-interaction --prefer-dist
          docker compose exec -T app npm ci
      - name: Configure application
        run: |
          docker compose exec -T app cp .env.example .env
          docker compose exec -T app php artisan key:generate
      - name: Wait for MySQL and migrate
        run: |
          timeout 60 sh -c 'until docker compose exec -T app php artisan migrate --force 2>/dev/null; do sleep 2; done'
      - run: docker compose exec -T app npm run build
      - name: Wait for app
        run: |
          timeout 30 sh -c 'until curl -sf http://localhost:8080/up 2>/dev/null; do sleep 2; done'
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/results/
          retention-days: 7
